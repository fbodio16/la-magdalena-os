<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
const sb=createClient('https://grlifamrkdoffglvrttu.supabase.co','sb_publishable_NlFza1aVKzhWh2Xiwm0VGQ_wI1aPdTN')
const S={session:null,companies:[],companyId:'',lots:[],geometries:[],analyses:[],orders:[],clients:[],irrigations:[],cuts:[],trips:[],movements:[],modules:[],weather:null,page:'dashboard',map:null,drawn:null,selectedLotId:''};const $=s=>document.querySelector(s);const esc=x=>String(x??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
async function init(){const {data}=await sb.auth.getSession();if(data.session)await showApp(data.session);sb.auth.onAuthStateChange(async(_e,s)=>s?showApp(s):showLogin())}
function showLogin(){$('#login').classList.remove('hidden');$('#app').classList.add('hidden')}
async function showApp(session){
  S.session=session;
  $('#login').classList.add('hidden');
  $('#app').classList.remove('hidden');
  $('#content').innerHTML='<div class="panel"><h2>Cargando dashboard…</h2><p class="muted">Conectando con la base de datos.</p></div>';
  try{
    await loadCompanies();
    await loadData();
    render();
    loadWeather().then(()=>{ if(S.page==='dashboard'||S.page==='weather') render(); }).catch(console.warn);
  }catch(err){
    console.error(err);
    $('#content').innerHTML=`<div class="panel"><h2>No se pudo cargar el dashboard</h2><p class="error">${esc(err?.message||err)}</p><button id="retryLoad" class="primary">Reintentar</button></div>`;
    const retry=$('#retryLoad'); if(retry) retry.onclick=()=>showApp(session);
  }
}
$('#loginForm').onsubmit=async e=>{e.preventDefault();const m=$('#loginMsg');m.classList.add('hidden');const {error}=await sb.auth.signInWithPassword({email:$('#email').value.trim(),password:$('#password').value});if(error){m.textContent=error.message;m.classList.remove('hidden')}};
$('#signupBtn').onclick=async()=>{const m=$('#loginMsg'),email=$('#email').value.trim(),password=$('#password').value;m.classList.add('hidden');if(!email||password.length<6){m.textContent='Ingresá un correo y una contraseña de al menos 6 caracteres.';m.classList.remove('hidden');return}const {error}=await sb.auth.signUp({email,password,options:{data:{full_name:'Franco Luciano Bodio'}}});m.textContent=error?error.message:'Cuenta creada. Si Supabase solicita confirmación, revisá tu correo.';m.classList.remove('hidden')};
$('#resetBtn').onclick=async()=>{const m=$('#loginMsg'),email=$('#email').value.trim();m.classList.add('hidden');if(!email){m.textContent='Ingresá tu correo primero.';m.classList.remove('hidden');return}const {error}=await sb.auth.resetPasswordForEmail(email);m.textContent=error?error.message:'Se envió el enlace de recuperación al correo.';m.classList.remove('hidden')};
$('#logout').onclick=()=>sb.auth.signOut();$('#menuBtn').onclick=()=>$('#side').classList.toggle('open');$('#nav').onclick=e=>{const b=e.target.closest('button[data-page]');if(!b)return;S.page=b.dataset.page;document.querySelectorAll('#nav button').forEach(x=>x.classList.toggle('active',x===b));$('#side').classList.remove('open');render()};$('#companySelect').onchange=async e=>{S.companyId=e.target.value;await loadData();await loadWeather();render()}
async function loadCompanies(){const {data,error}=await sb.from('companies').select('*').order('name');if(error)throw error;S.companies=data||[];S.companyId=S.companyId||S.companies[0]?.id||'';$('#companySelect').innerHTML=S.companies.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('');$('#companySelect').value=S.companyId}
async function safeTable(name,order){let q=sb.from(name).select('*').eq('company_id',S.companyId);if(order)q=q.order(order,{ascending:false});const r=await q;return r.error?[]:(r.data||[])}
async function loadData(){if(!S.companyId)return;const [a,b,c,d,e,f,g,h,i,j]=await Promise.all([safeTable('lots','name'),safeTable('lot_geometries'),safeTable('precision_analyses','flight_date'),safeTable('precision_orders','order_date'),safeTable('clients','created_at'),safeTable('irrigation_events','event_date'),safeTable('alfalfa_cuts','cut_date'),safeTable('transport_trips','trip_date'),safeTable('financial_movements','movement_date'),safeTable('company_modules','module_key')]);S.lots=a;S.geometries=b;S.analyses=c;S.orders=d;S.clients=e;S.irrigations=f;S.cuts=g;S.trips=h;S.movements=i;S.modules=j}
async function loadWeather(){try{const c=S.companies.find(x=>x.id===S.companyId)||{};const lat=Number(c.latitude||-31.332065),lng=Number(c.longitude||-63.311986);const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,wind_direction_10m,weather_code&hourly=temperature_2m,relative_humidity_2m,precipitation_probability,precipitation,wind_speed_10m,et0_fao_evapotranspiration&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,et0_fao_evapotranspiration&timezone=America%2FArgentina%2FCordoba&forecast_days=7`;const controller=new AbortController();const timer=setTimeout(()=>controller.abort(),8000);const r=await fetch(url,{signal:controller.signal});clearTimeout(timer);if(!r.ok)throw new Error('Clima no disponible');S.weather=await r.json()}catch(e){console.warn(e);S.weather=null}}
const weatherText=code=>({0:'Despejado',1:'Mayormente despejado',2:'Parcialmente nublado',3:'Nublado',45:'Niebla',48:'Niebla con escarcha',51:'Llovizna leve',53:'Llovizna',55:'Llovizna intensa',61:'Lluvia leve',63:'Lluvia',65:'Lluvia intensa',71:'Nieve leve',80:'Chaparrones',81:'Chaparrones',82:'Chaparrones fuertes',95:'Tormenta'}[code]||'Variable');
const money=n=>new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:0}).format(Number(n||0));
const latest=l=>S.analyses.find(a=>a.lot_id===l.id);const previous=l=>S.analyses.filter(a=>a.lot_id===l.id)[1];const vigor=v=>v==null?['Sin datos','warn']:v<.45?['Bajo','bad']:v<.62?['Medio','warn']:v<.78?['Bueno','']:['Muy alto',''];const totalHa=()=>S.lots.reduce((s,x)=>s+Number(x.hectares||0),0);const avgNdvi=()=>{const a=S.analyses.filter(x=>x.ndvi_avg!=null);return a.length?a.reduce((s,x)=>s+Number(x.ndvi_avg),0)/a.length:0}
const planLabel=p=>({basic:'Básico',professional:'Profesional',premium:'Premium',enterprise:'Enterprise'}[p]||p||'Sin plan');
function render(){try{const titles={saas:'Centro SaaS',dashboard:'Dashboard',management:'Tablero gerencial',weather:'Centro meteorológico',production:'Producción',map:'Precisión y mapa',irrigation:'Riego inteligente',flights:'Vuelos y análisis',orders:'Órdenes T100',lots:'Lotes',clients:'Clientes',transport:'Transporte',admin:'Administración',ai:'LM AI',portal:'Portal de clientes'};$('#pageTitle').textContent=titles[S.page];$('#content').innerHTML=({saas:saasPage,dashboard:dashboardPage,management:managementPage,weather:weatherPage,production:productionPage,map:mapPage,irrigation:irrigationPage,flights:flightsPage,orders:ordersPage,lots:lotsPage,clients:clientsPage,transport:transportPage,admin:adminPage,ai:aiPage,portal:portalPage}[S.page])();bind();if(S.page==='map')setTimeout(initMap,50)}catch(err){console.error(err);$('#content').innerHTML=`<div class="panel"><h2>Error al mostrar ${esc(S.page)}</h2><p class="error">${esc(err?.message||err)}</p></div>`}}
function dashboardPage(){const alerts=S.lots.filter(l=>Number(latest(l)?.ndvi_avg||1)<.62).length,w=S.weather?.current,weather=w?`${weatherText(w.weather_code)} · ${Number(w.temperature_2m).toFixed(1)} °C · viento ${Number(w.wind_speed_10m).toFixed(0)} km/h`:'Clima sin conexión';const income=S.movements.filter(x=>String(x.type||x.movement_type||'').toLowerCase().includes('ing')).reduce((a,x)=>a+Number(x.amount||0),0),expense=S.movements.filter(x=>String(x.type||x.movement_type||'').toLowerCase().includes('egr')).reduce((a,x)=>a+Number(x.amount||0),0);return `<div class="hero"><div style="display:flex;justify-content:space-between;gap:20px;align-items:center;flex-wrap:wrap"><div><p class="eyebrow">CENTRO DE CONTROL ENTERPRISE</p><h2>Buenas tardes, Franco</h2><p>Gestión integral, precisión, riego y servicios de ${esc(S.companies.find(c=>c.id===S.companyId)?.name||'la empresa')}.</p></div><div class="status" style="background:#ffffff18;color:#fff;min-width:260px"><b>🌦 ${weather}</b><small style="display:block;margin-top:5px;color:#dcebe4">Pronóstico actualizado automáticamente</small></div></div></div><div class="metrics"><div class="metric"><span>Lotes</span><b>${S.lots.length}</b><small>${totalHa()} ha</small></div><div class="metric"><span>NDVI promedio</span><b>${avgNdvi().toFixed(2)}</b><small>${S.analyses.length} análisis</small></div><div class="metric"><span>Alertas</span><b>${alerts}</b><small>bajo vigor / revisar</small></div><div class="metric"><span>Resultado</span><b>${money(income-expense)}</b><small>ingresos menos egresos</small></div></div><div class="grid2"><div class="panel"><div class="panel-title"><h3>Estado por lote</h3><button class="secondary goMap">Abrir mapa</button></div>${S.lots.slice(0,8).map(l=>{const a=latest(l),v=vigor(a?.ndvi_avg);return `<div class="row"><div><b>${esc(l.name)} · ${esc(l.crop||'Sin cultivo')}</b><small>${a?`${a.flight_date} · NDVI ${Number(a.ndvi_avg).toFixed(2)} · Bajo vigor ${Number(a.low_vigor_pct||0).toFixed(1)}%`:'Sin vuelo procesado'}</small></div><span class="pill ${v[1]}">${v[0]}</span></div>`}).join('')}</div><div class="panel"><div class="panel-title"><h3>Acciones rápidas</h3></div><div class="actions"><button class="primary newAnalysis">Importar vuelo</button><button class="secondary goMap">Dibujar lotes</button><button class="secondary newOrder">Crear orden T100</button><button class="secondary goPortal">Portal cliente</button></div><hr style="border:0;border-top:1px solid var(--line);margin:18px 0"><h3>Alertas operativas</h3>${alerts?`<p class="status">${alerts} lote(s) requieren inspección por vigor medio o bajo.</p>`:'<p class="status">Sin alertas agronómicas críticas.</p>'}${S.orders.filter(x=>x.status!=='Completada').length?`<p class="status">${S.orders.filter(x=>x.status!=='Completada').length} orden(es) T100 pendientes.</p>`:''}</div></div>`}
function managementPage(){const income=S.movements.filter(x=>String(x.type||x.movement_type||'').toLowerCase().includes('ing')).reduce((a,x)=>a+Number(x.amount||0),0),expense=S.movements.filter(x=>String(x.type||x.movement_type||'').toLowerCase().includes('egr')).reduce((a,x)=>a+Number(x.amount||0),0),rolls=S.cuts.reduce((a,x)=>a+Number(x.bales||x.rolls||0),0),haDrone=S.analyses.reduce((a,x)=>a+Number(x.hectares||0),0);return `<div class="page-head"><div><p class="eyebrow">DIRECCIÓN Y CONTROL</p><h2>Tablero gerencial</h2><p class="muted">Indicadores productivos, operativos y financieros consolidados.</p></div></div><div class="metrics"><div class="metric"><span>Ingresos</span><b>${money(income)}</b><small>movimientos registrados</small></div><div class="metric"><span>Egresos</span><b>${money(expense)}</b><small>costos registrados</small></div><div class="metric"><span>Resultado</span><b>${money(income-expense)}</b><small>margen acumulado</small></div><div class="metric"><span>Rollos producidos</span><b>${rolls}</b><small>${S.cuts.length} cortes</small></div></div><div class="grid2"><div class="panel"><h3>Operación</h3><div class="row"><b>Superficie gestionada</b><span class="pill">${totalHa()} ha</span></div><div class="row"><b>Hectáreas monitoreadas</b><span class="pill">${haDrone.toFixed(1)} ha</span></div><div class="row"><b>Órdenes T100 activas</b><span class="pill">${S.orders.filter(x=>x.status!=='Completada').length}</span></div><div class="row"><b>Clientes registrados</b><span class="pill">${S.clients.length}</span></div><div class="row"><b>Viajes registrados</b><span class="pill">${S.trips.length}</span></div></div><div class="panel"><h3>Prioridades de gestión</h3>${S.lots.filter(l=>Number(latest(l)?.ndvi_avg||1)<.62).slice(0,5).map(l=>`<div class="row"><div><b>${esc(l.name)}</b><small>Revisar vigor, humedad y nutrición.</small></div><span class="pill warn">Atención</span></div>`).join('')||'<div class="empty">No hay prioridades críticas.</div>'}</div></div>`}
function weatherPage(){const w=S.weather;if(!w)return `<div class="panel empty"><h2>Centro meteorológico</h2><p>No fue posible obtener el pronóstico. Verifique la conexión a internet.</p><button class="primary refreshWeather">Reintentar</button></div>`;const c=w.current,d=w.daily;return `<div class="page-head"><div><p class="eyebrow">CLIMA Y OPERACIONES</p><h2>Centro meteorológico</h2><p class="muted">Santiago Temple · pronóstico operativo de 7 días.</p></div><button class="secondary refreshWeather">Actualizar</button></div><div class="hero"><div class="grid2"><div><p class="eyebrow">CONDICIONES ACTUALES</p><h2>${Number(c.temperature_2m).toFixed(1)} °C · ${weatherText(c.weather_code)}</h2><p>Humedad ${c.relative_humidity_2m}% · Viento ${Number(c.wind_speed_10m).toFixed(0)} km/h</p></div><div class="status" style="background:#ffffff18;color:#fff"><b>Ventana operativa</b><p style="margin:8px 0 0">${Number(c.wind_speed_10m)<=18?'Condiciones compatibles con inspección y vuelo, sujeto a ráfagas locales.':'Viento elevado: postergar vuelos y aplicaciones sensibles.'}</p></div></div></div><div class="grid3">${d.time.map((day,i)=>`<article class="panel"><span class="pill">${new Date(day+'T12:00:00').toLocaleDateString('es-AR',{weekday:'short',day:'2-digit',month:'2-digit'})}</span><h3 style="margin-top:14px">${weatherText(d.weather_code[i])}</h3><p><b>${Math.round(d.temperature_2m_max[i])}°</b> / ${Math.round(d.temperature_2m_min[i])}°</p><p>💧 Lluvia ${Number(d.precipitation_sum[i]||0).toFixed(1)} mm</p><p>☔ Prob. ${Number(d.precipitation_probability_max[i]||0).toFixed(0)}%</p><p>ET₀ ${Number(d.et0_fao_evapotranspiration[i]||0).toFixed(1)} mm</p></article>`).join('')}</div>`}

function aiPage(){return `<div class="page-head"><div><p class="eyebrow">ASISTENTE OPERATIVO</p><h2>LM AI</h2><p class="muted">Consultas sobre clima, riego, lotes, NDVI, producción, clientes, transporte y órdenes T100.</p></div></div><div class="grid2"><div class="panel"><h3>Hacer una consulta</h3><label>Pregunta<textarea id="aiQuestion" placeholder="Ejemplo: ¿Qué lotes debería revisar o regar primero?"></textarea></label><div class="actions"><button id="askAi" class="primary">Consultar</button></div><div id="aiResponse" class="status" style="margin-top:16px">Escriba una pregunta para analizar los datos actuales de la empresa.</div></div><div class="panel"><h3>Consultas sugeridas</h3><div class="row"><div><b>Riego</b><small>¿Qué lotes conviene regar primero?</small></div></div><div class="row"><div><b>Clima</b><small>¿Cómo estará el viento y la lluvia?</small></div></div><div class="row"><div><b>Precisión</b><small>¿Qué lotes tienen NDVI bajo?</small></div></div><div class="row"><div><b>Operación</b><small>¿Cuántas órdenes T100 están pendientes?</small></div></div><div class="row"><div><b>Producción</b><small>¿Cuántos rollos de alfalfa hay registrados?</small></div></div></div></div>`}
function portalPage(){const alerts=S.lots.filter(l=>Number(latest(l)?.ndvi_avg||1)<.62);return `<div class="page-head"><div><p class="eyebrow">VISTA DEL PRODUCTOR</p><h2>Portal de clientes</h2><p class="muted">Resumen seguro de la empresa seleccionada.</p></div></div><div class="client-card"><h2>${esc(S.companies.find(c=>c.id===S.companyId)?.name||'Empresa')}</h2><div class="metrics"><div class="metric"><span>Superficie</span><b>${totalHa()} ha</b></div><div class="metric"><span>Vuelos</span><b>${S.analyses.length}</b></div><div class="metric"><span>Alertas</span><b>${alerts.length}</b></div><div class="metric"><span>Órdenes pendientes</span><b>${S.orders.filter(x=>x.status!=='Completada').length}</b></div></div></div><div class="panel" style="margin-top:18px"><h3>Recomendaciones recientes</h3>${S.analyses.slice(0,6).map(a=>`<div class="row"><div><b>${esc(S.lots.find(l=>l.id===a.lot_id)?.name||'Lote')} · ${a.flight_date}</b><small>${esc(a.recommendation||a.observations||'Sin observaciones')}</small></div><span class="pill">NDVI ${Number(a.ndvi_avg||0).toFixed(2)}</span></div>`).join('')||'<div class="empty">Sin informes todavía.</div>'}</div>`}

function cutMeta(c){try{const n=String(c.notes||'');if(!n.startsWith('LMOS_CUT:'))return{observations:n};return JSON.parse(n.slice(9))}catch(_e){return{observations:String(c.notes||'')}}}
function normalizedCut(c){const m=cutMeta(c),rolls=Number(c.bales||c.rolls||0),kg=Number(c.total_kg||0),ha=Number(m.hectares||0);return{...c,...m,rolls,kg,hectares:ha,weight:rolls?kg/rolls:Number(m.weight||500),quality:m.quality||'Sin clasificar',destination:m.destination||'Stock',cut_number:Number(m.cut_number||0)}}
function productionPage(){const cuts=S.cuts.map(normalizedCut),rolls=cuts.reduce((s,x)=>s+x.rolls,0),kg=cuts.reduce((s,x)=>s+x.kg,0),stockCuts=cuts.filter(x=>x.destination==='Stock'),stockRolls=stockCuts.reduce((s,x)=>s+x.rolls,0),qualities=['Premium','Primera','Segunda','Descarte','Sin clasificar'];return `<div class="page-head"><div><p class="eyebrow">PRODUCCIÓN · ALFALFA</p><h2>Cortes y stock de rollos</h2><p class="muted">Registrá cada corte, calculá rendimientos y controlá el stock disponible.</p></div><div class="actions"><button class="primary newCut">＋ Nuevo corte</button></div></div><div class="metrics"><div class="metric"><span>Cortes registrados</span><b>${cuts.length}</b><small>historial completo</small></div><div class="metric"><span>Rollos producidos</span><b>${rolls.toLocaleString('es-AR')}</b><small>acumulados</small></div><div class="metric"><span>Toneladas</span><b>${(kg/1000).toFixed(1)}</b><small>producción total</small></div><div class="metric"><span>Stock estimado</span><b>${stockRolls.toLocaleString('es-AR')}</b><small>rollos con destino stock</small></div></div><div class="grid2"><div class="panel"><div class="panel-title"><h3>Historial de cortes</h3><span class="pill">${cuts.length} registros</span></div>${cuts.length?`<div style="overflow:auto"><table class="table"><thead><tr><th>Fecha</th><th>Lote</th><th>Corte</th><th>Ha</th><th>Rollos</th><th>t</th><th>Rollos/ha</th><th>Calidad</th><th>Destino</th></tr></thead><tbody>${cuts.map(c=>{const lot=S.lots.find(l=>l.id===c.lot_id);return `<tr><td>${esc(c.cut_date)}</td><td><b>${esc(lot?.name||'Sin lote')}</b></td><td>${c.cut_number?c.cut_number+'°':'—'}</td><td>${c.hectares?c.hectares.toFixed(1):'—'}</td><td>${c.rolls}</td><td>${(c.kg/1000).toFixed(1)}</td><td>${c.hectares?(c.rolls/c.hectares).toFixed(1):'—'}</td><td><span class="pill">${esc(c.quality)}</span></td><td>${esc(c.destination)}</td></tr>`}).join('')}</tbody></table></div>`:'<div class="empty"><b>Todavía no hay cortes registrados.</b><p>Presioná “Nuevo corte” para cargar la primera producción.</p></div>'}</div><div class="panel"><div class="panel-title"><h3>Stock por calidad</h3><span class="pill">${stockRolls} rollos</span></div>${qualities.map(q=>{const rows=stockCuts.filter(x=>x.quality===q),r=rows.reduce((s,x)=>s+x.rolls,0),k=rows.reduce((s,x)=>s+x.kg,0);return `<div class="row"><div><b>${q}</b><small>${(k/1000).toFixed(1)} toneladas</small></div><span class="pill">${r} rollos</span></div>`}).join('')}<div class="status" style="margin-top:14px">El stock considera los cortes cuyo destino fue “Stock”. Las ventas se integrarán después con Transporte y Clientes.</div></div></div>`}
function irrigationPage(){const eto=4.8,rain=0;const cards=S.lots.map(l=>{const last=S.irrigations.find(x=>x.lot_id===l.id),days=last?Math.max(0,Math.floor((Date.now()-new Date(last.event_date||last.irrigation_date).getTime())/86400000)):7,kc=(l.crop||'').toLowerCase().includes('alfalfa')?1.05:.85,def=Math.max(0,days*eto*kc-rain-Number(last?.millimeters||last?.mm||0)*.15),hrs=def/4.5,prio=def>25?'Urgente':def>15?'Alta':def>7?'Media':'Correcto';return {l,days,def,hrs,prio}});return `<div class="page-head"><div><p class="eyebrow">BALANCE HÍDRICO</p><h2>Riego inteligente</h2><p class="muted">Estimación orientativa con ET₀ 4,8 mm/día. Confirmar con humedad de suelo y recorrido.</p></div></div><div class="grid3">${cards.map(x=>`<article class="analysis-card"><div class="panel-title"><b>${esc(x.l.name)}</b><span class="pill ${x.prio==='Urgente'?'bad':x.prio==='Alta'||x.prio==='Media'?'warn':''}">${x.prio}</span></div><b class="big">${x.def.toFixed(1)} mm</b><p>${x.days} días desde el último riego registrado</p><p><b>${x.hrs.toFixed(1)} h</b> sugeridas a 4,5 mm/h</p><small class="muted">Cultivo: ${esc(x.l.crop||'—')} · ${Number(x.l.hectares||0)} ha</small></article>`).join('')}</div>`}

function adminPage(){const inc=S.movements.filter(x=>(x.type||x.movement_type||'').toLowerCase().includes('ing')).reduce((s,x)=>s+Number(x.amount||0),0),out=S.movements.filter(x=>!(x.type||x.movement_type||'').toLowerCase().includes('ing')).reduce((s,x)=>s+Number(x.amount||0),0);return `<div class="page-head"><div><p class="eyebrow">GESTIÓN</p><h2>Administración</h2></div></div><div class="metrics"><div class="metric"><span>Ingresos</span><b>$ ${inc.toLocaleString('es-AR')}</b></div><div class="metric"><span>Egresos</span><b>$ ${out.toLocaleString('es-AR')}</b></div><div class="metric"><span>Resultado</span><b>$ ${(inc-out).toLocaleString('es-AR')}</b></div><div class="metric"><span>Movimientos</span><b>${S.movements.length}</b></div></div>`}
function aiAnswer(q){const t=(q||'').toLowerCase(),w=S.weather?.current,d=S.weather?.daily;const low=S.lots.filter(l=>Number(latest(l)?.ndvi_avg||1)<.62),pending=S.orders.filter(x=>x.status!=='Completada'),rain=d?d.precipitation_sum.reduce((a,x)=>a+Number(x||0),0):0;if(!t)return 'Escriba una pregunta sobre riego, clima, lotes, producción, drones, transporte o finanzas.';if(t.includes('regar')||t.includes('riego'))return low.length?`Priorice ${low.slice(0,4).map(x=>x.name).join(', ')}. Hay ${rain.toFixed(1)} mm previstos en 7 días. Confirme la decisión con humedad de suelo y estado del cultivo.`:`No hay lotes con alerta NDVI. Hay ${rain.toFixed(1)} mm previstos en 7 días; revise el balance hídrico antes de regar.`;if(t.includes('clima')||t.includes('viento')||t.includes('lluvia'))return w?`Ahora: ${Number(w.temperature_2m).toFixed(1)} °C, ${weatherText(w.weather_code)}, viento ${Number(w.wind_speed_10m).toFixed(0)} km/h y humedad ${w.relative_humidity_2m}%. Lluvia acumulada prevista: ${rain.toFixed(1)} mm.`:'No pude obtener el clima en este momento.';if(t.includes('t100')||t.includes('orden'))return `Hay ${pending.length} órdenes T100 pendientes y ${S.orders.length} órdenes totales.`;if(t.includes('ndvi')||t.includes('lote'))return `NDVI promedio ${avgNdvi().toFixed(2)}. ${low.length?`Revisar: ${low.map(x=>x.name).join(', ')}.`:'No hay alertas de vigor.'}`;if(t.includes('rollo')||t.includes('alfalfa'))return `Hay ${S.cuts.length} cortes registrados y ${S.cuts.reduce((a,x)=>a+Number(x.bales||x.rolls||0),0)} rollos acumulados.`;if(t.includes('cliente'))return `La empresa tiene ${S.clients.length} clientes registrados.`;if(t.includes('viaje')||t.includes('scania'))return `Hay ${S.trips.length} viajes registrados en transporte.`;return `Resumen: ${S.lots.length} lotes, ${totalHa()} ha, NDVI ${avgNdvi().toFixed(2)}, ${low.length} alertas y ${pending.length} órdenes T100 pendientes.`}
function saasPage(){const active=S.companies.filter(c=>(c.status||'active')==='active').length,mrr=S.companies.reduce((sum,c)=>sum+Number(c.monthly_price||0),0);return `<div class="page-head"><div><p class="eyebrow">ADMINISTRACIÓN DE LA PLATAFORMA</p><h2>Centro SaaS</h2><p class="muted">Empresas, planes, módulos y estado comercial de cada cliente.</p></div><div class="actions"><button class="primary newCompany">+ Nueva empresa</button></div></div><div class="metrics"><div class="metric"><span>Empresas</span><b>${S.companies.length}</b><small>${active} activas</small></div><div class="metric"><span>MRR estimado</span><b>$ ${mrr.toLocaleString('es-AR')}</b><small>ingreso mensual</small></div><div class="metric"><span>Planes premium</span><b>${S.companies.filter(c=>['premium','enterprise'].includes(c.plan)).length}</b><small>cuentas avanzadas</small></div><div class="metric"><span>Implementación</span><b>${S.companies.filter(c=>(c.onboarding_status||'pending')!=='complete').length}</b><small>clientes pendientes</small></div></div><div class="panel"><div class="panel-title"><h3>Cartera de clientes</h3><span class="pill">Superadministrador</span></div><div style="overflow:auto"><table class="table"><thead><tr><th>Empresa</th><th>Ubicación</th><th>Plan</th><th>Estado</th><th>Precio mensual</th><th>Módulos</th><th></th></tr></thead><tbody>${S.companies.map(c=>{const mods=S.modules.filter(m=>m.company_id===c.id&&m.enabled).length;return `<tr><td><b>${esc(c.name)}</b><small>${esc(c.legal_name||'')}</small></td><td>${esc(c.location||'-')}</td><td>${planLabel(c.plan)}</td><td><span class="pill ${(c.status==='active'||!c.status)?'':'warn'}">${esc(c.status||'active')}</span></td><td>$ ${Number(c.monthly_price||0).toLocaleString('es-AR')}</td><td>${mods}</td><td><button class="secondary editCompany" data-id="${c.id}">Administrar</button></td></tr>`}).join('')||'<tr><td colspan="7" class="empty">No hay empresas.</td></tr>'}</tbody></table></div></div><div class="grid3" style="margin-top:18px"><div class="panel"><h3>Planes sugeridos</h3><div class="row"><div><b>Básico</b><small>Lotes, agenda y reportes</small></div></div><div class="row"><div><b>Profesional</b><small>Riego, maquinaria y costos</small></div></div><div class="row"><div><b>Premium</b><small>Precisión, drones y LM AI</small></div></div></div><div class="panel"><h3>Modelo comercial</h3><p class="muted">Suscripción mensual más servicios administrados de drones, mapas e informes agronómicos.</p><div class="status">Cada empresa mantiene sus datos separados mediante políticas RLS.</div></div><div class="panel"><h3>Publicación web</h3><p class="muted">El paquete incluye una guía para desplegar la aplicación y conectar un dominio propio.</p><div class="status">La clave administrativa nunca debe colocarse en el navegador.</div></div></div>`}
function companyModal(company=null){const enabled=new Set(S.modules.filter(m=>m.company_id===company?.id&&m.enabled).map(m=>m.module_key));const all=['dashboard','production','precision','irrigation','drones','lots','clients','transport','admin','ai','portal'];modal(`<p class="eyebrow">V10 ENTERPRISE</p><h2>${company?'Administrar empresa':'Nueva empresa'}</h2><form id="companyForm"><input type="hidden" name="id" value="${company?.id||''}"><div class="form-grid"><label>Nombre comercial<input name="name" value="${esc(company?.name||'')}" required></label><label>Razón social<input name="legal_name" value="${esc(company?.legal_name||'')}"></label><label>Ubicación<input name="location" value="${esc(company?.location||'')}"></label><label>Plan<select name="plan"><option value="basic" ${company?.plan==='basic'?'selected':''}>Básico</option><option value="professional" ${company?.plan==='professional'?'selected':''}>Profesional</option><option value="premium" ${company?.plan==='premium'?'selected':''}>Premium</option><option value="enterprise" ${company?.plan==='enterprise'?'selected':''}>Enterprise</option></select></label><label>Estado<select name="status"><option value="active" ${(company?.status||'active')==='active'?'selected':''}>Activa</option><option value="trial" ${company?.status==='trial'?'selected':''}>Prueba</option><option value="suspended" ${company?.status==='suspended'?'selected':''}>Suspendida</option></select></label><label>Precio mensual<input name="monthly_price" type="number" step="1" value="${Number(company?.monthly_price||0)}"></label><label>Implementación<select name="onboarding_status"><option value="pending" ${(company?.onboarding_status||'pending')==='pending'?'selected':''}>Pendiente</option><option value="in_progress" ${company?.onboarding_status==='in_progress'?'selected':''}>En curso</option><option value="complete" ${company?.onboarding_status==='complete'?'selected':''}>Completa</option></select></label><label>Vencimiento<input name="subscription_expires_at" type="date" value="${company?.subscription_expires_at?.slice?.(0,10)||''}"></label><div class="wide"><b>Módulos habilitados</b><div class="grid3" style="margin-top:10px">${all.map(k=>`<label style="display:flex;grid-template-columns:auto 1fr;align-items:center"><input style="width:auto" type="checkbox" name="module" value="${k}" ${enabled.has(k)||(!company&&['dashboard','lots','clients'].includes(k))?'checked':''}> ${k}</label>`).join('')}</div></div></div><button class="primary">Guardar empresa</button><p id="cm" class="error hidden"></p></form>`);$('#companyForm').onsubmit=saveCompany}
async function saveCompany(e){e.preventDefault();const f=new FormData(e.target),id=f.get('id'),row={name:f.get('name'),legal_name:f.get('legal_name')||null,location:f.get('location')||null,plan:f.get('plan'),status:f.get('status'),monthly_price:Number(f.get('monthly_price')||0),onboarding_status:f.get('onboarding_status'),subscription_expires_at:f.get('subscription_expires_at')||null};try{let companyId=id;if(id){const {error}=await sb.from('companies').update(row).eq('id',id);if(error)throw error}else{row.created_by=S.session.user.id;const {data,error}=await sb.from('companies').insert(row).select().single();if(error)throw error;companyId=data.id}const mods=[...f.getAll('module')];await sb.from('company_modules').delete().eq('company_id',companyId);if(mods.length){const {error}=await sb.from('company_modules').insert(mods.map(module_key=>({company_id:companyId,module_key,enabled:true})));if(error)throw error}$('#modalRoot').innerHTML='';await loadCompanies();await loadData();S.page='saas';render()}catch(err){$('#cm').textContent=err.message;$('#cm').classList.remove('hidden')}}

function bind(){document.querySelectorAll('.refreshWeather').forEach(b=>b.onclick=async()=>{await loadWeather();render()});document.querySelectorAll('.newCompany').forEach(b=>b.onclick=()=>companyModal());document.querySelectorAll('.editCompany').forEach(b=>b.onclick=()=>companyModal(S.companies.find(c=>c.id===b.dataset.id)));document.querySelectorAll('.newCut').forEach(b=>b.onclick=cutModal);const ask=$('#askAi');if(ask)ask.onclick=()=>{$('#aiResponse').textContent=aiAnswer($('#aiQuestion').value)};document.querySelectorAll('.newAnalysis').forEach(b=>b.onclick=analysisModal);document.querySelectorAll('.newOrder').forEach(b=>b.onclick=()=>orderModal());document.querySelectorAll('.goMap').forEach(b=>b.onclick=()=>{S.page='map';render()});document.querySelectorAll('.goPortal').forEach(b=>b.onclick=()=>{S.page='portal';render()});document.querySelectorAll('.makeOrder').forEach(b=>b.onclick=()=>orderFromAnalysis(b.dataset.id));document.querySelectorAll('.openFile').forEach(b=>b.onclick=()=>openStoredFile(b.dataset.path))}
function initMap(){if(S.map)S.map.remove();S.map=L.map('map').setView([-31.332065,-63.311986],14);const street=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:20,attribution:'© OpenStreetMap'});const satellite=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:20,attribution:'Esri World Imagery'}).addTo(S.map);S.drawn=new L.FeatureGroup().addTo(S.map);S.geometries.forEach(g=>{try{const layer=L.geoJSON(g.geojson,{style:()=>{const a=S.analyses.find(x=>x.lot_id===g.lot_id),n=Number(a?.ndvi_avg||0);return{color:n<.45?'#b93636':n<.62?'#bd7a16':n<.78?'#4b8f52':'#126047',weight:3,fillOpacity:.28}}}).addTo(S.map);const l=S.lots.find(x=>x.id===g.lot_id),a=latest(l||{});layer.bindPopup(`<b>${esc(l?.name||'Lote')}</b><br>${esc(l?.crop||'')} · ${Number(l?.hectares||0)} ha<br>NDVI ${a?Number(a.ndvi_avg).toFixed(2):'s/d'}`)}catch(e){console.warn(e)}});const drawControl=new L.Control.Draw({draw:{polyline:false,rectangle:false,circle:false,circlemarker:false,marker:false,polygon:{allowIntersection:false,showArea:true}},edit:{featureGroup:S.drawn,remove:true}});S.map.addControl(drawControl);S.map.on(L.Draw.Event.CREATED,e=>{S.drawn.clearLayers();S.drawn.addLayer(e.layer)});$('#satelliteBtn').onclick=()=>{S.map.eachLayer(x=>{if(x instanceof L.TileLayer)S.map.removeLayer(x)});satellite.addTo(S.map)};$('#streetBtn').onclick=()=>{S.map.eachLayer(x=>{if(x instanceof L.TileLayer)S.map.removeLayer(x)});street.addTo(S.map)};$('#mapLotSelect').onchange=e=>S.selectedLotId=e.target.value;$('#saveGeometry').onclick=saveGeometry}
async function saveGeometry(){const lotId=$('#mapLotSelect').value,layer=S.drawn.getLayers()[0];if(!lotId)return alert('Seleccione un lote.');if(!layer)return alert('Dibuje un polígono con la herramienta del mapa.');const center=layer.getBounds().getCenter(),row={company_id:S.companyId,lot_id:lotId,geojson:layer.toGeoJSON(),center_lat:center.lat,center_lng:center.lng,updated_by:S.session.user.id,updated_at:new Date().toISOString()};const {error}=await sb.from('lot_geometries').upsert(row,{onConflict:'lot_id'});if(error)return alert(error.message);await loadData();alert('Polígono guardado.');render()}
function modal(html){$('#modalRoot').innerHTML=`<div class="modal-wrap"><div class="modal"><button class="close">×</button>${html}</div></div>`;$('.close').onclick=()=>$('#modalRoot').innerHTML=''}
function cutModal(){const today=new Date().toISOString().slice(0,10);modal(`<p class="eyebrow">ALFALFA · PRODUCCIÓN</p><h2>Registrar nuevo corte</h2><form id="cutForm"><div class="form-grid"><label>Fecha<input name="cut_date" type="date" value="${today}" required></label><label>Lote<select name="lot_id" id="cutLot" required><option value="">Seleccionar lote</option>${S.lots.map(l=>`<option value="${l.id}" data-ha="${Number(l.hectares||0)}">${esc(l.name)} · ${Number(l.hectares||0)} ha</option>`).join('')}</select></label><label>Número de corte<input name="cut_number" type="number" min="1" max="20" value="1" required></label><label>Superficie cortada (ha)<input id="cutHa" name="hectares" type="number" min="0.1" step="0.1" required></label><label>Rollos obtenidos<input id="cutRolls" name="rolls" type="number" min="0" step="1" required></label><label>Peso promedio por rollo (kg)<input id="cutWeight" name="weight" type="number" min="1" step="1" value="500" required></label><label>Calidad<select name="quality"><option>Premium</option><option>Primera</option><option>Segunda</option><option>Descarte</option></select></label><label>Destino<select name="destination"><option>Stock</option><option>Venta</option><option>Consumo interno</option></select></label><label class="wide">Observaciones<textarea name="observations" placeholder="Estado del cultivo, humedad, clima, contratista…"></textarea></label></div><div id="cutCalc" class="status" style="margin:12px 0">Completá superficie y rollos para ver el rendimiento.</div><button class="primary">Guardar corte</button><p id="cutMsg" class="error hidden"></p></form>`);const calc=()=>{const ha=Number($('#cutHa').value||0),rolls=Number($('#cutRolls').value||0),weight=Number($('#cutWeight').value||0),kg=rolls*weight;$('#cutCalc').innerHTML=`<b>${rolls} rollos · ${(kg/1000).toFixed(1)} toneladas</b><br>${ha?`${(rolls/ha).toFixed(1)} rollos/ha · ${(kg/ha).toFixed(0)} kg/ha`:'Ingresá la superficie para calcular el rendimiento.'}`};$('#cutLot').onchange=e=>{const opt=e.target.selectedOptions[0],ha=Number(opt?.dataset?.ha||0);if(ha)$('#cutHa').value=ha;calc()};['#cutHa','#cutRolls','#cutWeight'].forEach(id=>$(id).oninput=calc);$('#cutForm').onsubmit=saveCut;calc()}
async function saveCut(e){e.preventDefault();const f=new FormData(e.target),msg=$('#cutMsg');msg.classList.add('hidden');try{const rolls=Number(f.get('rolls')),weight=Number(f.get('weight')),hectares=Number(f.get('hectares'));if(!S.companyId)throw new Error('No hay una empresa seleccionada.');if(!f.get('lot_id'))throw new Error('Seleccioná un lote.');if(!(hectares>0))throw new Error('La superficie debe ser mayor que cero.');if(!Number.isFinite(rolls)||rolls<0)throw new Error('Revisá la cantidad de rollos.');const meta={cut_number:Number(f.get('cut_number')),hectares,weight,quality:f.get('quality'),destination:f.get('destination'),observations:f.get('observations')||''};const row={company_id:S.companyId,lot_id:f.get('lot_id'),cut_date:f.get('cut_date'),bales:rolls,rolls,total_kg:rolls*weight,notes:'LMOS_CUT:'+JSON.stringify(meta)};const {error}=await sb.from('alfalfa_cuts').insert(row);if(error)throw error;$('#modalRoot').innerHTML='';await loadData();S.page='production';render()}catch(err){msg.textContent=err.message;msg.classList.remove('hidden')}}
function analysisModal(){modal(`<p class="eyebrow">ANÁLISIS MULTIESPECTRAL</p><h2>Importar vuelo procesado</h2><form id="analysisForm"><div class="form-grid"><label>Fecha<input name="flight_date" type="date" required></label><label>Lote<select name="lot_id" required><option value="">Seleccionar</option>${S.lots.map(l=>`<option value="${l.id}">${esc(l.name)}</option>`).join('')}</select></label><label>Superficie (ha)<input name="hectares" type="number" step=".1" required></label><label>CSV de zonas<input name="csv" type="file" accept=".csv,text/csv" required></label><label>Mapa procesado (opcional)<input name="map" type="file" accept="image/*,.pdf,.tif,.tiff"></label><label class="wide">Observaciones<textarea name="observations"></textarea></label></div><p class="status">CSV requerido: zone,ndvi,ndre,area_ha. Se calcularán promedios y porcentaje de bajo vigor automáticamente.</p><button class="primary">Procesar y guardar</button><p id="am" class="error hidden"></p></form>`);$('#analysisForm').onsubmit=saveAnalysis}
function parseCSV(text){const lines=text.trim().split(/\r?\n/).filter(Boolean),headers=lines.shift().split(',').map(x=>x.trim().toLowerCase());const req=['zone','ndvi','ndre','area_ha'];if(req.some(x=>!headers.includes(x)))throw new Error('El CSV debe contener: zone, ndvi, ndre, area_ha');return lines.map(line=>{const vals=line.split(',');const o={};headers.forEach((h,i)=>o[h]=vals[i]?.trim());return{zone:o.zone,ndvi:Number(o.ndvi),ndre:Number(o.ndre),area_ha:Number(o.area_ha)}}).filter(x=>Number.isFinite(x.ndvi)&&Number.isFinite(x.ndre)&&Number.isFinite(x.area_ha))}
async function uploadFile(file,folder){if(!file)return null;const safe=file.name.replace(/[^a-zA-Z0-9._-]/g,'_'),path=`${S.companyId}/${folder}/${Date.now()}_${safe}`;const {error}=await sb.storage.from('precision-files').upload(path,file,{upsert:false});if(error)throw error;return path}
async function saveAnalysis(e){e.preventDefault();const f=new FormData(e.target),msg=$('#am');try{const csv=f.get('csv'),zones=parseCSV(await csv.text());if(!zones.length)throw new Error('El CSV no tiene filas válidas.');const weighted=(key)=>zones.reduce((s,z)=>s+z[key]*z.area_ha,0)/zones.reduce((s,z)=>s+z.area_ha,0);const vals=k=>zones.map(z=>z[k]);const lowArea=zones.filter(z=>z.ndvi<.55).reduce((s,z)=>s+z.area_ha,0),total=zones.reduce((s,z)=>s+z.area_ha,0),ndvi=weighted('ndvi'),ndre=weighted('ndre');const csvPath=await uploadFile(csv,'csv'),mapPath=await uploadFile(f.get('map')?.size?f.get('map'):null,'maps');const lowPct=total?lowArea/total*100:0;const recommendation=ndvi<.45?'Prioridad alta: inspeccionar estrés hídrico, fallas de implantación o nutrición.':ndvi<.62?'Vigor medio: recorrer sectores de menor índice y verificar humedad/nutrición.':'Vigor general adecuado; mantener seguimiento y comparar con el próximo vuelo.';const row={company_id:S.companyId,lot_id:f.get('lot_id'),flight_date:f.get('flight_date'),hectares:Number(f.get('hectares')),ndvi_avg:ndvi,ndvi_min:Math.min(...vals('ndvi')),ndvi_max:Math.max(...vals('ndvi')),ndre_avg:ndre,ndre_min:Math.min(...vals('ndre')),ndre_max:Math.max(...vals('ndre')),low_vigor_pct:lowPct,zones_count:zones.length,source_file_path:csvPath,map_file_path:mapPath,zones_json:zones,observations:f.get('observations')||null,recommendation,created_by:S.session.user.id};const {error}=await sb.from('precision_analyses').insert(row);if(error)throw error;$('#modalRoot').innerHTML='';await loadData();render()}catch(err){msg.textContent=err.message;msg.classList.remove('hidden')}}
function orderFromAnalysis(id){const a=S.analyses.find(x=>x.id===id),lot=S.lots.find(x=>x.id===a?.lot_id);orderModal({lot_id:lot?.id,hectares:Math.max(.1,Number(a?.hectares||0)*Number(a?.low_vigor_pct||0)/100),notes:`Generada desde análisis ${a?.flight_date}. Bajo vigor: ${Number(a?.low_vigor_pct||0).toFixed(1)}%. ${a?.recommendation||''}`})}
function orderModal(seed={}){modal(`<p class="eyebrow">DJI AGRAS T100</p><h2>Nueva orden</h2><form id="orderForm"><div class="form-grid"><label>Fecha<input name="order_date" type="date" required></label><label>Lote<select name="lot_id" required><option value="">Seleccionar</option>${S.lots.map(l=>`<option value="${l.id}" ${seed.lot_id===l.id?'selected':''}>${esc(l.name)}</option>`).join('')}</select></label><label>Trabajo<input name="application_type" value="Aplicación localizada" required></label><label>Superficie (ha)<input name="hectares" type="number" step=".1" value="${Number(seed.hectares||0).toFixed(1)}" required></label><label>Producto<input name="product" required></label><label>Dosis<input name="dose" type="number" step=".01" required></label><label>Unidad<select name="dose_unit"><option>L/ha</option><option>kg/ha</option></select></label><label>Estado<select name="status"><option>Planificada</option><option>En curso</option><option>Completada</option></select></label><label class="wide">Notas<textarea name="notes">${esc(seed.notes||'')}</textarea></label></div><button class="primary">Guardar orden</button><p id="om" class="error hidden"></p></form>`);$('#orderForm').onsubmit=saveOrder}
async function saveOrder(e){e.preventDefault();const f=new FormData(e.target),lot=S.lots.find(x=>x.id===f.get('lot_id')),ha=Number(f.get('hectares')),dose=Number(f.get('dose')),row={company_id:S.companyId,lot_id:lot.id,lot_name:lot.name,order_date:f.get('order_date'),application_type:f.get('application_type'),hectares:ha,product:f.get('product'),dose,dose_unit:f.get('dose_unit'),estimated_product:ha*dose,estimated_batteries:Math.ceil(ha/18),estimated_minutes:Math.round(ha*4.5),status:f.get('status'),notes:f.get('notes')||null};const {error}=await sb.from('precision_orders').insert(row);if(error){$('#om').textContent=error.message;$('#om').classList.remove('hidden');return}$('#modalRoot').innerHTML='';await loadData();render()}
async function openStoredFile(path){if(!path)return alert('Este análisis no tiene mapa cargado.');const {data,error}=await sb.storage.from('precision-files').createSignedUrl(path,300);if(error)return alert(error.message);window.open(data.signedUrl,'_blank')}
async function verifyBackend(){const state=$('#connectionState');try{const {error}=await sb.from('companies').select('id',{count:'exact',head:true});if(error)throw error;state.textContent='✓ Supabase conectado y base disponible';state.style.background='#e8f7ee';state.style.color='#126047'}catch(e){state.textContent='No se pudo conectar: '+(e?.message||e);state.style.background='#ffeaea';state.style.color='#9b2525'}}
verifyBackend();
init().catch(e=>{console.error(e);const m=$('#loginMsg');m.textContent='Error al iniciar: '+e.message;m.classList.remove('hidden')})
</script></body></html>
